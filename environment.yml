name: bapao
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip

  # Core scientific stack (conda-forge = stable binaries)
  - numpy>=1.26,<2.1
  - scipy>=1.11,<1.14
  - pandas>=2.1,<2.3
  - matplotlib>=3.8,<3.11
  - scikit-learn>=1.3,<1.6
  - h5py>=3.8
  - tqdm>=4.66

  # Jupyter
  - jupyter
  - ipython

  # pip-only dependencies
  - pip:
      - tensorflow>=2.15,<2.17
      - tensorflow-probability>=0.23,<0.25
      - emcee>=3.1.0
      - mlflow>=2.10,<3.1

      # install the bapao package in editable mode
      - -e .